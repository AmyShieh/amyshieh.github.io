<!DOCTYPE html>
<html class="staticrypt-html" lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <title>私人空间</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex,nofollow" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --bg-start: #f4faf2;
                --bg-end: #cde6c7;
                --card-bg: #ffffff;
                --primary: #2e8555;
                --primary-hover: #29784c;
                --text: #1f2937;
                --text-soft: #6b7280;
                --border: #dbe9d4;
                --input-bg: #f4faf2;
                --shadow-tint: rgba(46, 133, 85, 0.18);
            }

            * {
                box-sizing: border-box;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                min-height: 100%;
                margin: 0;
                background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
                font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: var(--text);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
            }

            .staticrypt-form {
                background: var(--card-bg);
                border-radius: 18px;
                padding: 40px 32px;
                box-shadow: 0 20px 50px -20px var(--shadow-tint),
                            0 4px 12px -2px rgba(0, 0, 0, 0.05);
                text-align: center;
            }

            .staticrypt-emoji {
                font-size: 48px;
                line-height: 1;
                margin-bottom: 12px;
            }

            .staticrypt-instructions {
                margin: 0 0 24px;
            }

            .staticrypt-title {
                font-size: 22px;
                font-weight: 600;
                margin: 0 0 8px;
                color: var(--text);
            }

            .staticrypt-instructions p {
                font-size: 14px;
                color: var(--text-soft);
                margin: 0;
                line-height: 1.5;
            }

            .staticrypt-hr {
                display: none;
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: 10px;
                margin-bottom: 16px;
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(46, 133, 85, 0.15);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-size: 15px;
                outline: 0;
                padding: 14px 44px 14px 16px;
                width: 100%;
                color: var(--text);
                font-family: inherit;
            }

            .staticrypt-form input::placeholder {
                color: #b8a888;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.55;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                box-sizing: content-box;
                transition: opacity 0.2s;
            }
            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.85;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 18px;
                font-size: 13px;
                color: var(--text-soft);
                cursor: pointer;
                user-select: none;
            }

            .staticrypt-remember input[type="checkbox"] {
                margin-right: 8px;
                accent-color: var(--primary);
                width: 16px;
                height: 16px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                background: var(--primary);
                width: 100%;
                border: 0;
                border-radius: 10px;
                padding: 14px;
                color: #ffffff;
                font-size: 15px;
                font-weight: 500;
                font-family: inherit;
                cursor: pointer;
                outline: 0;
                transition: background 0.2s, transform 0.1s;
                letter-spacing: 0.5px;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: var(--primary-hover);
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: scale(0.98);
            }

            .staticrypt-footer {
                margin-top: 18px;
                font-size: 12px;
                color: var(--text-soft);
                opacity: 0.7;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(46, 133, 85, 0.3);
                border-right-color: var(--primary);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;
                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
